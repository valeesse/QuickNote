name: Deploy to Debian Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }} # 这里在 GitHub 应该配置为 quicknote
          key: ${{ secrets.SERVER_SSH_KEY }}       # 这里是刚刚生成的私钥
          script: |
            cd /opt/quicknote/QuickNote
            
            git pull origin main
            
            
            docker compose down
            docker compose up -d --build
            docker image prune -f
